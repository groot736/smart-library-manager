services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_mgmt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/library_mgmt?schema=public
      JWT_SECRET: super-secret-jwt-key
      JWT_EXPIRY: 7d
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: demo@example.com
      SMTP_PASS: password
      APP_BASE_URL: http://localhost:5173
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
